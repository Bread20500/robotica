<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Robot Wall-E</title>
    <!-- Incluye Tailwind CSS para estilos rápidos y responsivos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Incluye las librerías Three.js y GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        /* Estilos personalizados para el cuerpo */
        body {
            margin: 0;
            overflow: hidden; /* Evita barras de desplazamiento */
            background-color: #87CEEB; /* Un azul cielo para el fondo */
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        /* Estilos para el contenedor del canvas */
        #robot-container {
            width: 100%;
            height: 80vh; /* Ocupa la mayor parte de la altura visible */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        canvas {
            display: block; /* Asegura que el canvas no tenga márgenes extra */
            width: 100% !important; /* Asegura que el canvas ocupe el ancho completo del contenedor */
            height: 100% !important; /* Asegura que el canvas ocupe el alto completo del contenedor */
        }
        /* Estilos para el mensaje de interacción */
        #interactionMessage {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            font-size: 1.2rem;
            color: #333;
            opacity: 0; /* Inicialmente oculto */
            transition: opacity 0.5s ease-in-out;
            pointer-events: none; /* Permite clics a través del mensaje */
        }
        #interactionMessage.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="robot-container">
        <!-- El canvas de Three.js se adjuntará aquí por JavaScript -->
    </div>
    <div id="interactionMessage"></div>

    <script>
        // Variables globales para la escena de Three.js
        let scene, camera, renderer, robot;
        let targetRotationX = 0;
        let targetRotationY = 0;
        let mouseX = 0, mouseY = 0;
        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;
        let interactionMessageTimeout;

        // Función para inicializar la escena 3D
        function init() {
            // Obtiene el contenedor del robot
            const container = document.getElementById('robot-container');

            // Crea la escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Fondo azul cielo

            // Crea la cámara (perspectiva)
            // Parámetros: campo de visión, relación de aspecto, cerca, lejos
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 5; // Posiciona la cámara un poco hacia atrás

            // Crea el renderizador WebGL
            renderer = new THREE.WebGLRenderer({ antialias: true }); // antialias para bordes más suaves
            renderer.setSize(container.clientWidth, container.clientHeight); // Establece el tamaño del renderizador
            container.appendChild(renderer.domElement); // Añade el canvas al contenedor HTML

            // Crea el modelo del robot (estilo Wall-E)
            robot = new THREE.Group(); // Un grupo para contener todas las partes del robot

            // Cuerpo (cubo principal)
            const bodyGeometry = new THREE.BoxGeometry(1.5, 1.2, 1.2);
            const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 }); // Color café óxido
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            robot.add(body);

            // Cabeza (cubo más pequeño encima del cuerpo)
            const headGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const headMaterial = new THREE.MeshStandardMaterial({ color: 0x696969 }); // Gris oscuro
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = 1.0; // Posiciona la cabeza encima del cuerpo
            robot.add(head);

            // Ojos (cilindros pequeños en la cabeza)
            const eyeGeometry = new THREE.CylinderGeometry(0.15, 0.15, 0.2, 32);
            const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 }); // Negro
            const eye1 = new THREE.Mesh(eyeGeometry, eyeMaterial);
            eye1.position.set(-0.25, 1.1, 0.4); // Posición del ojo izquierdo
            eye1.rotation.x = Math.PI / 2; // Rota para que el cilindro apunte hacia adelante
            robot.add(eye1);

            const eye2 = new THREE.Mesh(eyeGeometry, eyeMaterial);
            eye2.position.set(0.25, 1.1, 0.4); // Posición del ojo derecho
            eye2.rotation.x = Math.PI / 2;
            robot.add(eye2);

            // Brazos (cilindros a los lados del cuerpo)
            const armGeometry = new THREE.CylinderGeometry(0.1, 0.1, 1.0, 32);
            const armMaterial = new THREE.MeshStandardMaterial({ color: 0x696969 }); // Gris oscuro
            const arm1 = new THREE.Mesh(armGeometry, armMaterial);
            arm1.position.set(-1.0, 0, 0); // Posición del brazo izquierdo
            arm1.rotation.z = Math.PI / 2; // Rota para que el cilindro sea horizontal
            robot.add(arm1);

            const arm2 = new THREE.Mesh(armGeometry, armMaterial);
            arm2.position.set(1.0, 0, 0); // Posición del brazo derecho
            arm2.rotation.z = -Math.PI / 2;
            robot.add(arm2);

            // Ruedas (cilindros grandes en la base)
            const wheelGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 32);
            const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 }); // Gris muy oscuro/negro
            const wheel1 = new THREE.Mesh(wheelGeometry, wheelMaterial);
            wheel1.position.set(-0.8, -0.7, 0); // Posición de la rueda izquierda
            wheel1.rotation.z = Math.PI / 2;
            robot.add(wheel1);

            const wheel2 = new THREE.Mesh(wheelGeometry, wheelMaterial);
            wheel2.position.set(0.8, -0.7, 0); // Posición de la rueda derecha
            wheel2.rotation.z = Math.PI / 2;
            robot.add(wheel2);

            scene.add(robot); // Añade el robot a la escena

            // Añade luces para que el robot sea visible
            const ambientLight = new THREE.AmbientLight(0x404040); // Luz ambiental suave
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8); // Luz direccional fuerte
            directionalLight.position.set(1, 1, 1).normalize(); // Posición de la luz
            scene.add(directionalLight);

            // Añade event listeners para interacción
            document.addEventListener('mousemove', onDocumentMouseMove, false);
            renderer.domElement.addEventListener('click', onRobotClick, false);
            window.addEventListener('resize', onWindowResize, false);

            // Llama a onWindowResize una vez para establecer el tamaño inicial
            onWindowResize();
        }

        // Función para manejar el movimiento del ratón (para rotar el robot)
        function onDocumentMouseMove(event) {
            mouseX = (event.clientX - windowHalfX) / 100;
            mouseY = (event.clientY - windowHalfY) / 100;
        }

        // Función para manejar el clic en el robot
        function onRobotClick(event) {
            // Calcula la posición del clic en coordenadas normalizadas de dispositivo (-1 a +1)
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;

            // Crea un raycaster para detectar objetos intersectados
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            // Calcula los objetos que intersectan el rayo
            const intersects = raycaster.intersectObjects(robot.children, true); // true para incluir hijos

            if (intersects.length > 0) {
                // Si se hizo clic en el robot, haz que reaccione (ej. un pequeño salto)
                if (window.gsap) { // Asegúrate de que GSAP esté cargado
                    gsap.to(robot.position, { y: 0.5, duration: 0.2, yoyo: true, repeat: 1, ease: "power1.out" });
                }
                showMessage("¡Hola! :)", 1500); // Muestra un mensaje temporal
            }
        }

        // Función para mostrar un mensaje temporal
        function showMessage(message, duration) {
            const msgElement = document.getElementById('interactionMessage');
            msgElement.textContent = message;
            msgElement.classList.add('visible');

            clearTimeout(interactionMessageTimeout); // Limpia cualquier timeout anterior
            interactionMessageTimeout = setTimeout(() => {
                msgElement.classList.remove('visible');
            }, duration);
        }

        // Función para manejar el redimensionamiento de la ventana
        function onWindowResize() {
            const container = document.getElementById('robot-container');
            // Actualiza windowHalfX y windowHalfY para el cálculo del mouse
            windowHalfX = container.clientWidth / 2;
            windowHalfY = container.clientHeight / 2;

            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // Bucle de animación
        function animate() {
            requestAnimationFrame(animate); // Solicita el siguiente frame

            // Suaviza la rotación del robot con el movimiento del ratón
            robot.rotation.y += (mouseX - robot.rotation.y) * 0.05;
            robot.rotation.x += (-mouseY - robot.rotation.x) * 0.05;

            renderer.render(scene, camera); // Renderiza la escena
        }

        // Inicializa la escena y comienza la animación cuando el DOM esté completamente cargado
        document.addEventListener('DOMContentLoaded', () => {
            init();
            animate();
        });
    </script>
</body>
</html>
